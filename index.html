<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Tic-Tac-Toe</h1>
    </header>

    <section class="scoreContainer">
      <div class="player player1">
        <p class="playerName">Player X</p>
        <i id="btnRename1" class="fa-solid fa-pen-to-square"></i>
        <span id="player1Score" class="score">0</span>
      </div>
      <div class="player player2">
        <p class="playerName">Player O</p>
        <i id="btnRename2" class="fa-solid fa-pen-to-square"></i>
        <span id="player2Score" class="score">0</span>
      </div>
    </section>

    <section class="gameContainer">
      <div class="game"></div>

      <div class="gameOver" style="display: none">Game Over</div>

      <button id="btnReset">
        <b>Reset</b>
      </button>
    </section>

    <footer>
      <span>Game Status:&nbsp;</span>
      <span id="gameStatus">Not Running</span>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
